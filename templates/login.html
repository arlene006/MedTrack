{% extends 'base.html' %}

{% block content %}
<div class="auth-wrapper fade-in">
    <div class="glass-panel auth-card">
        <h2 style="margin-bottom: 2rem; text-align: center; color: var(--secondary-color);">Welcome Back</h2>

        <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
            <button onclick="setRole('patient')" id="btn-patient" class="btn"
                style="flex: 1; border: 1px solid var(--secondary-color); background: var(--secondary-color); color: white;">Patient</button>
            <button onclick="setRole('doctor')" id="btn-doctor" class="btn"
                style="flex: 1; border: 1px solid var(--glass-border); color: var(--text-gray);">Doctor</button>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <input type="hidden" name="role" id="role-input" value="patient">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-input" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-gray);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--secondary-color);">Register
                as Patient</a>
        </p>
    </div>
</div>

<script>
    function setRole(role) {
        document.getElementById('role-input').value = role;
        const pBtn = document.getElementById('btn-patient');
        const dBtn = document.getElementById('btn-doctor');

        if (role === 'patient') {
            pBtn.style.background = 'var(--secondary-color)';
            pBtn.style.color = 'white';
            dBtn.style.background = 'none';
            dBtn.style.color = 'var(--text-gray)';
        } else {
            dBtn.style.background = 'var(--secondary-color)';
            dBtn.style.color = 'white';
            pBtn.style.background = 'none';
            pBtn.style.color = 'var(--text-gray)';
        }
    }
</script>
{% endblock %}
