{% extends 'base.html' %}

{% block content %}
<div class="fade-in">
    <div class="glass-panel" style="max-width: 800px; margin: 0 auto;">
        <h2 style="margin-bottom: 2rem; color: var(--secondary-color);">Book an Appointment</h2>

        <form action="{{ url_for('book_appointment') }}" method="POST">
            <div class="form-group">
                <label>Select Doctor</label>
                <select name="doctor_id" class="form-input" style="background: rgba(30, 41, 59, 0.9);" required>
                    <option value="" disabled selected>Choose a specialist...</option>
                    {% for doctor in doctors %}
                    <option value="{{ doctor.email }}">Dr. {{ doctor.Name }} - {{ doctor.Specialization }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label>Appointment Date</label>
                    <input type="date" name="date" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Preferred Time</label>
                    <input type="time" name="time" class="form-input" required>
                </div>
            </div>

            <div class="form-group">
                <label>Reason for Visit (Brief)</label>
                <textarea name="reason" class="form-input" rows="3" placeholder="e.g. Annual checkup, flu symptoms..."
                    required></textarea>
            </div>

            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">Confirm Booking</button>
                <a href="{{ url_for('dashboard') }}" class="btn"
                    style="flex: 1; border: 1px solid var(--glass-border); text-align: center;">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
